name: Publish npm

env:
  BINARYEN_VERSION: version_125
  BINARYEN_X86_64_LINUX_SHA256: 7c3bc16599c8274a04d34a504fe4be2047884f900e0e2da2f6fb9cd667183be4

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-wasip1

      - name: Install Binaryen
        run: |
          archive="binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          curl -fsSLO "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/${archive}"
          echo "${BINARYEN_X86_64_LINUX_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}"
          echo "${PWD}/binaryen-${BINARYEN_VERSION}/bin" >> "${GITHUB_PATH}"

      - name: Build optimized WASM
        run: EG_VERSION="${GITHUB_REF_NAME#v}" ./scripts/build-wasm.sh

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Set version from tag
        working-directory: npm
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - name: Smoke test
        run: |
          node npm/bin/eg.mjs --help | grep 'Usage: eg'
          node npm/bin/eg.mjs --version | grep "^eg ${GITHUB_REF_NAME#v}$"
          node npm/bin/eg.mjs --type ts 'crates/esquery-grep/tests/fixtures/utils.ts' 'Identifier' | grep 'utils.ts'
          node npm/bin/eg.mjs 'crates/esquery-grep/tests/fixtures/app.js' 'Identifier'

      - name: Publish
        working-directory: npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
